services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    hostname: moe-dev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      # Mount project code
      - ..:/workspace:cached,z
      # Overlay a named volume on node_modules to prevent host writes
      - node_modules:/workspace/node_modules
    networks:
      - devnet
    ports:
      - "4321:4321"
    environment:
      PNPM_HOME: "/home/moe/.local/share/pnpm"

networks:
  devnet:
    driver: bridge

volumes:
  node_modules:
